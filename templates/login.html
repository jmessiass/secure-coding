<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnBank - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; align-items: center; }
        .card { background: #16213e; border: 1px solid #0f3460; }
        .btn-primary { background: #e94560; border-color: #e94560; }
        .btn-primary:hover { background: #c73652; border-color: #c73652; }
        .brand { color: #e94560; font-weight: bold; }
        .form-label { color: #a8b2d1; font-weight: 500; }
        .subtitle { color: #8892b0; }
        .test-users { color: #8892b0; }
        .test-users strong { color: #ccd6f6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow">
                    <h2 class="text-center mb-4">🏦 <span class="brand">VulnBank</span></h2>
                    <p class="text-center subtitle small">Demo — Treinamento Desenvolvimento Seguro</p>

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuário</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Digite seu usuário" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Digite sua senha" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    </form>


                </div>
            </div>
        </div>
    </div>
</body>
</html>
