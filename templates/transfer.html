<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnBank - Transferência</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; color: #eee; }
        .navbar { background: #16213e !important; }
        .card { background: #16213e; border: 1px solid #0f3460; }
        .brand { color: #e94560; font-weight: bold; }
        a { color: #53a8b6; }
        .btn-primary { background: #e94560; border-color: #e94560; }
        .form-label { color: #a8b2d1; font-weight: 500; }
        .card h4 { color: #ccd6f6; }
        .text-muted { color: #8892b0 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">🏦 <span class="brand">VulnBank</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">Conta</a>
                <a class="nav-link active" href="/transfer">Transferir</a>
                <a class="nav-link" href="/fetch-url">Consultas</a>
                <span class="nav-link text-muted">|</span>
                <a class="nav-link" href="/logout">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="mb-3">Transferência Bancária</h4>

                    {% if message %}
                    <div class="alert alert-success">{{ message }}</div>
                    {% endif %}
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="/transfer">
                        <div class="mb-3">
                            <label for="from_account" class="form-label">Conta Origem</label>
                            <select class="form-select" id="from_account" name="from_account" required>
                                {% for acc in accounts %}
                                <option value="{{ acc['id'] }}">
                                    {{ acc['account_number'] }} (R$ {{ "%.2f"|format(acc['balance']) }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="to_account" class="form-label">Conta Destino (número)</label>
                            <input type="text" class="form-control" id="to_account" name="to_account"
                                   placeholder="Ex: 200001" required>
                        </div>
                        <div class="mb-3">
                            <label for="amount" class="form-label">Valor (R$)</label>
                            <input type="text" class="form-control" id="amount" name="amount"
                                   placeholder="Ex: 100.00" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Transferir</button>
                    </form>


                </div>
            </div>
        </div>
    </div>
</body>
</html>
